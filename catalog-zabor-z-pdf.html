<title>Забор Z — Каталог моделей 2026 (PDF)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--dark:#0f1923;--dark2:#162033;--bronze:#c8956c;--bronze-l:#e8c4a0;--gold:#D4AF37;--orange:#e85d26;--light:#faf8f5;--white:#fff;--text:#2d3748;--muted:#718096}
@page{size:A4 portrait;margin:0}
@media print{
  body{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .page{box-shadow:none!important;margin:0!important}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;color:var(--text);background:#e0ddd8;line-height:1.5;font-size:10pt}
.page{width:210mm;height:297mm;background:var(--white);position:relative;overflow:hidden;page-break-after:always;page-break-inside:avoid;margin:10px auto;box-shadow:0 4px 30px rgba(0,0,0,.12)}

/* ========== COVER ========== */
.cover{background:var(--dark);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30mm 24mm}
.cover-logo{font-size:52pt;font-weight:900;color:var(--white);letter-spacing:6px;margin-bottom:6mm}
.cover-logo span{color:var(--bronze)}
.cover-line{width:60mm;height:2px;background:linear-gradient(90deg,transparent,var(--bronze),transparent);margin:8mm auto}
.cover-title{font-size:18pt;font-weight:300;color:rgba(255,255,255,.7);letter-spacing:3px;text-transform:uppercase;margin-bottom:4mm}
.cover-subtitle{font-size:13pt;font-weight:400;color:var(--bronze);margin-bottom:16mm;letter-spacing:1px}
.cover-fence{margin:10mm auto;opacity:.15}
.cover-bottom{position:absolute;bottom:20mm;left:0;right:0;text-align:center;color:rgba(255,255,255,.35);font-size:9pt}
.cover-bottom b{color:rgba(255,255,255,.6)}
.cover-year{font-size:80pt;font-weight:900;color:rgba(255,255,255,.04);position:absolute;top:15mm;right:20mm;letter-spacing:5px}

/* ========== TOC ========== */
.toc{padding:20mm 24mm}
.toc h2{font-size:22pt;font-weight:800;color:var(--dark);margin-bottom:10mm;letter-spacing:1px}
.toc-section{padding:3mm 0;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:baseline;gap:3mm}
.toc-dot{flex:1;border-bottom:1.5px dotted rgba(0,0,0,.15);margin:0 2mm;transform:translateY(-2px)}
.toc-name{font-size:11pt;font-weight:600;color:var(--dark)}
.toc-count{font-size:9pt;color:var(--muted);margin-left:2mm}
.toc-pg{font-size:11pt;font-weight:700;color:var(--bronze);min-width:10mm;text-align:right}
.toc-divider{margin:8mm 0 6mm;padding:0;border:none;border-top:2px solid var(--bronze);width:30mm}
.toc-about h3{font-size:14pt;font-weight:700;color:var(--dark);margin-bottom:4mm}
.toc-about p{font-size:10pt;color:var(--muted);line-height:1.7;margin-bottom:4mm}
.toc-stats{display:flex;gap:8mm;margin-top:5mm}
.toc-stat{text-align:center}
.toc-stat-num{font-size:22pt;font-weight:800;color:var(--bronze);display:block}
.toc-stat-label{font-size:8pt;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ========== MODEL PAGE ========== */
.mp{padding:0;display:flex;flex-direction:column}
.mp-header{background:var(--dark);padding:5mm 7mm;display:flex;align-items:center;justify-content:space-between;gap:4mm}
.mp-header-left{display:flex;align-items:center;gap:4mm}
.mp-name{font-size:18pt;font-weight:800;color:var(--white);letter-spacing:.5px}
.mp-type{font-size:8pt;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1.5px;margin-top:1mm}
.mp-badge{padding:2mm 4mm;border-radius:2mm;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--white)}
.mp-badge-prm{background:linear-gradient(135deg,var(--bronze),var(--gold))}
.mp-badge-hit{background:var(--orange)}
.mp-header-right{text-align:right}
.mp-price{font-size:16pt;font-weight:800;color:var(--bronze)}
.mp-price-label{font-size:7pt;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px}

.mp-body{flex:1;padding:5mm 7mm 4mm;display:flex;flex-direction:column}

/* Photo grid */
.mp-photos{display:grid;grid-template-columns:1.5fr 1fr;grid-template-rows:auto auto;gap:3mm;margin-bottom:4mm}
.mp-photo-main{grid-row:1/3;border-radius:3mm;overflow:hidden;background:#e8e3dd}
.mp-photo-main svg{width:100%;height:100%;display:block}
.mp-photo-3d{border-radius:3mm;overflow:hidden;background:#eae5dd}
.mp-photo-3d svg{width:100%;display:block}
.mp-photo-draw{border-radius:3mm;overflow:hidden;background:#f0ece6}
.mp-photo-draw svg{width:100%;display:block}
.mp-photos-small{display:grid;grid-template-columns:repeat(3,1fr);gap:3mm;margin-bottom:4mm}
.mp-photos-small div{border-radius:2mm;overflow:hidden;background:#e8e3dd}
.mp-photos-small svg{width:100%;display:block}

/* Info area */
.mp-desc{font-size:9pt;color:var(--muted);line-height:1.7;margin-bottom:4mm;max-height:14mm;overflow:hidden}

.mp-specs{margin-bottom:3mm}
.mp-specs-title{font-size:7pt;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2mm}
.mp-spec{display:flex;align-items:center;gap:2mm;margin-bottom:1.5mm}
.mp-spec-icon{font-size:9pt;width:5mm;text-align:center;flex-shrink:0}
.mp-spec-label{font-size:8pt;font-weight:600;color:var(--text);width:28mm;flex-shrink:0}
.mp-spec-bar{flex:1;height:2mm;border-radius:1mm;background:rgba(200,149,108,.12);overflow:hidden}
.mp-spec-fill{height:100%;border-radius:1mm;background:linear-gradient(90deg,var(--bronze-l),var(--bronze),var(--gold))}
.mp-spec-val{font-size:8pt;font-weight:700;color:var(--bronze);width:15mm;text-align:right;flex-shrink:0}

/* Tags */
.mp-tags{display:flex;flex-wrap:wrap;gap:2mm;margin-bottom:3mm}
.mp-tag{padding:1mm 3mm;border-radius:1.5mm;font-size:7pt;font-weight:600}
.mp-tag-steel{background:rgba(22,32,51,.06);color:var(--dark2)}
.mp-tag-paint{background:rgba(200,149,108,.1);color:var(--bronze)}
.mp-tag-seg{background:var(--dark);color:var(--white);font-weight:700;letter-spacing:.3px}

/* Value scale */
.mp-value{display:flex;align-items:center;gap:2mm;margin-top:auto;padding-top:2mm}
.mp-value-label{font-size:6pt;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.mp-value-bar{flex:1;height:1.5mm;border-radius:1mm;background:rgba(200,149,108,.12);overflow:hidden}
.mp-value-fill{height:100%;border-radius:1mm;background:linear-gradient(90deg,var(--bronze-l),var(--bronze),var(--gold))}

/* Page number */
.mp-footer{position:absolute;bottom:4mm;left:7mm;right:7mm;display:flex;justify-content:space-between;align-items:center;font-size:7pt;color:var(--muted)}
.mp-footer-logo{font-weight:800;color:var(--dark);letter-spacing:1px}
.mp-footer-logo span{color:var(--bronze)}

/* ========== OTHER PAGE ========== */
.other-page{padding:12mm 7mm}
.other-page h2{font-size:20pt;font-weight:800;color:var(--dark);text-align:center;margin-bottom:3mm}
.other-page .sub{font-size:10pt;color:var(--muted);text-align:center;margin-bottom:8mm}
.other-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4mm;margin-bottom:8mm}
.other-card{border-radius:3mm;overflow:hidden;background:var(--light);text-align:center}
.other-card svg{width:100%;display:block}
.other-card-name{padding:3mm 2mm;font-size:9pt;font-weight:600;color:var(--dark)}
.other-cta-box{text-align:center;padding:6mm;background:rgba(200,149,108,.06);border-radius:3mm;border:1px solid rgba(200,149,108,.15)}
.other-cta-box h3{font-size:14pt;font-weight:700;color:var(--dark);margin-bottom:2mm}
.other-cta-box p{font-size:9pt;color:var(--muted)}

/* ========== COMPARISON TABLE PAGE ========== */
.table-page{padding:10mm 5mm}
.table-page h2{font-size:18pt;font-weight:800;color:var(--dark);text-align:center;margin-bottom:6mm}
.cmp-table{width:100%;border-collapse:collapse;font-size:7pt}
.cmp-table thead{background:var(--dark)}
.cmp-table th{padding:2mm 2mm;color:rgba(255,255,255,.85);font-weight:700;text-transform:uppercase;letter-spacing:.3px;text-align:left;font-size:6pt}
.cmp-table td{padding:1.8mm 2mm;border-bottom:1px solid rgba(0,0,0,.06);font-size:7pt;vertical-align:middle}
.cmp-table tbody tr:hover{background:rgba(200,149,108,.04)}
.cmp-name{font-weight:700;color:var(--dark)}
.cmp-type{font-size:6pt;color:var(--muted)}
.cmp-price{font-weight:700;color:var(--bronze)}
.cmp-seg{display:inline-block;padding:1mm 2.5mm;border-radius:1mm;font-size:6pt;font-weight:700;text-transform:uppercase}
.cmp-seg-eco{background:rgba(200,149,108,.1);color:var(--bronze)}
.cmp-seg-std{background:rgba(200,149,108,.2);color:#a07848}
.cmp-seg-prm{background:linear-gradient(135deg,rgba(212,175,55,.15),rgba(200,149,108,.15));color:var(--gold)}
.cmp-bar{width:12mm;height:1.5mm;border-radius:1mm;background:rgba(200,149,108,.1);overflow:hidden;display:inline-block;vertical-align:middle;margin-right:1mm}
.cmp-bar-fill{height:100%;border-radius:1mm;background:linear-gradient(90deg,var(--bronze-l),var(--gold))}

/* ========== PAINT PAGE ========== */
.paint-page{padding:10mm 7mm}
.paint-page h2{font-size:18pt;font-weight:800;color:var(--dark);text-align:center;margin-bottom:6mm}
.paint-grid{display:grid;grid-template-columns:1fr 1fr;gap:4mm;margin-bottom:6mm}
.paint-card{padding:4mm;border-radius:3mm;border:1px solid rgba(0,0,0,.06);background:var(--light)}
.paint-card h3{font-size:10pt;font-weight:700;margin-bottom:1mm;display:flex;align-items:center;gap:2mm}
.paint-card h3 .pi{font-size:14pt}
.paint-card p{font-size:8pt;color:var(--muted);line-height:1.5;margin-bottom:2mm}
.paint-pros{display:flex;flex-wrap:wrap;gap:1.5mm}
.paint-pros span{font-size:7pt;font-weight:600;padding:1mm 3mm;border-radius:1.5mm;background:rgba(200,149,108,.1);color:var(--bronze)}

.palette-title{font-size:12pt;font-weight:700;color:var(--dark);text-align:center;margin:5mm 0 3mm}
.palette-sub{font-size:8pt;color:var(--muted);text-align:center;margin-bottom:4mm}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3mm;max-width:120mm;margin:0 auto 5mm}
.color-dot{aspect-ratio:1;border-radius:3mm;position:relative}
.color-dot-name{font-size:5pt;text-align:center;margin-top:1mm;color:var(--muted);font-weight:600}
.palette-note{text-align:center;font-size:8pt;color:var(--muted);margin-bottom:8mm}

/* Contact block */
.contact-block{background:var(--dark);border-radius:4mm;padding:8mm;text-align:center;color:var(--white)}
.contact-block h3{font-size:16pt;font-weight:800;margin-bottom:2mm}
.contact-block h3 em{font-style:normal;color:var(--bronze)}
.contact-block p{font-size:9pt;color:rgba(255,255,255,.5);margin-bottom:5mm}
.contact-phone{font-size:18pt;font-weight:800;color:var(--white);display:block;margin-bottom:3mm}
.contact-wa{display:inline-block;background:#25d366;color:var(--white);padding:3mm 6mm;border-radius:2mm;font-size:10pt;font-weight:700}
.contact-bonuses{display:flex;justify-content:center;gap:5mm;margin-top:4mm}
.contact-bonus{font-size:7pt;color:rgba(255,255,255,.5);padding:1.5mm 3mm;background:rgba(255,255,255,.06);border-radius:1.5mm}

/* ========== SECTION DIVIDERS ========== */
.section-divider{background:var(--dark);padding:0 7mm;display:flex;align-items:center;min-height:20mm}
.section-divider h2{font-size:20pt;font-weight:800;color:var(--white);letter-spacing:1px}
.section-divider .sd-count{font-size:11pt;color:var(--bronze);margin-left:4mm;font-weight:600}
</style>
